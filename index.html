<!DOCTYPE html>
<html lang="ja">
<head>


  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#111111">






  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>バイト給料計算</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#111111" />
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #121826;
      --muted: #667085;
      --border: #d9dee8;
      --soft: #eef2f7;
      --accent: #111827;
      --danger: #b42318;
      --radius: 22px;
      --shadow: 0 12px 34px rgba(15, 23, 42, 0.10);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    button, input, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      width: 100%;
      max-width: 520px;
      min-height: 100vh;
      margin: 0 auto;
      padding: 16px 16px calc(28px + var(--safe-bottom));
    }

    header {
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
    }

    .app-title {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: 0.04em;
      font-weight: 700;
    }

    .gear-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: transparent;
      color: var(--text);
      font-size: 28px;
      line-height: 1;
    }

    .main-card {
      margin-top: 18px;
      padding: 22px 18px 20px;
      border-radius: 30px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .time-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .time-input,
    .number-input,
    .text-input,
    select {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px 14px;
      background: #fff;
      color: var(--text);
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      font-size: 17px;
      font-weight: 700;
    }

    .time-input:focus,
    .number-input:focus,
    .text-input:focus,
    select:focus {
      border-color: #111827;
      box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.10);
    }

    .break-section {
      margin-top: 16px;
    }

    .break-head,
    .break-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .break-list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .break-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px;
      background: #fff;
    }

    .break-title {
      font-size: 13px;
      font-weight: 900;
      color: var(--muted);
    }

    .mini-btn {
      min-height: 36px;
      padding: 7px 12px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--text);
      font-size: 13px;
      font-weight: 900;
    }

    .break-empty {
      margin-top: 10px;
      padding: 14px 10px;
      border: 1px dashed var(--border);
      border-radius: 18px;
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      line-height: 1.5;
      background: #fff;
    }

    .hint {
      margin: 12px 2px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .primary-btn {
      display: block;
      width: min(260px, 100%);
      min-height: 54px;
      margin: 30px auto 6px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      font-size: 17px;
      box-shadow: 0 12px 24px rgba(17, 24, 39, 0.20);
    }

    .secondary-btn {
      min-height: 46px;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--text);
      font-weight: 800;
    }

    .danger-btn {
      min-height: 40px;
      min-width: 64px;
      padding: 8px 13px;
      border-radius: 999px;
      background: #fee4e2;
      color: var(--danger);
      font-weight: 800;
      white-space: nowrap;
      flex: 0 0 auto;
      text-align: center;
    }

    .ghost-btn {
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
    }

    .result-area {
      display: none;
      margin-top: 18px;
      padding: 22px 18px 20px;
      border-radius: 30px;
      background: var(--card);
      box-shadow: var(--shadow);
    }

    .result-times {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 18px;
    }

    .result-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: baseline;
      margin: 10px 0;
      padding: 0 8px;
    }

    .result-label {
      color: var(--text);
      font-size: 16px;
      font-weight: 800;
    }

    .result-value {
      font-weight: 900;
      letter-spacing: -0.02em;
      font-size: 24px;
    }

    .result-value.total {
      font-size: 32px;
    }

    .save-row {
      display: flex;
      justify-content: flex-end;
      margin-top: 22px;
    }

    .breakdown {
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.65;
    }

    .breakdown strong { color: var(--text); }

    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.42);
      z-index: 50;
      padding: calc(14px + env(safe-area-inset-top, 0px)) 14px calc(14px + var(--safe-bottom));
      align-items: center;
      justify-content: center;
    }

    .modal-backdrop.show { display: flex; }

    .sheet {
      width: 100%;
      max-width: 520px;
      max-height: min(88vh, 760px);
      overflow: auto;
      background: var(--card);
      border-radius: 28px;
      padding: 18px 16px calc(18px + var(--safe-bottom));
      box-shadow: 0 -8px 32px rgba(15, 23, 42, 0.22);
    }

    .settings-sheet {
      height: min(88vh, 760px);
      height: min(88dvh, 760px);
      max-height: min(88vh, 760px);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .settings-menu {
      flex: 1 1 auto;
      display: grid;
      align-content: start;
      gap: 12px;
      padding-top: 8px;
    }

    .settings-menu.hidden { display: none; }

    .settings-menu-btn {
      width: 100%;
      min-height: 66px;
      border: 1px solid var(--border);
      border-radius: 22px;
      background: #fff;
      color: var(--text);
      font-weight: 900;
      font-size: 17px;
      text-align: left;
      padding: 18px;
    }

    .settings-menu-btn:active {
      transform: scale(0.99);
    }

    .settings-detail {
      flex: 1 1 auto;
      min-height: 0;
      display: none;
      flex-direction: column;
    }

    .settings-detail.active { display: flex; }

    .detail-header {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 2px 0 8px;
    }

    .detail-title {
      font-size: 18px;
      font-weight: 900;
    }

    .settings-content {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }

    .settings-content::-webkit-scrollbar {
      display: none;
    }

    .sheet-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .sheet-title {
      font-weight: 900;
      font-size: 20px;
    }

    .close-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--soft);
      color: var(--text);
      font-size: 24px;
      line-height: 1;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .setting-card,
    .allowance-card,
    .saved-card,
    .save-preview {
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 14px;
      background: #fff;
      margin-top: 12px;
    }

    .settings-grid {
      display: grid;
      gap: 14px;
    }

    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .tiny-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 7px;
    }

    .allowance-top,
    .saved-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .allowance-top > div,
    .saved-top > div {
      min-width: 0;
    }

    .allowance-name,
    .saved-name {
      font-weight: 900;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .allowance-details,
    .saved-details {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.55;
      margin-top: 8px;
    }

    .switch-row {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-end;
    }

    .check {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .check input {
      width: 20px;
      height: 20px;
      accent-color: #111827;
    }

    .empty {
      padding: 24px 10px;
      color: var(--muted);
      text-align: center;
      line-height: 1.65;
      font-size: 14px;
    }

    .empty-card {
      border: 1px solid var(--border);
      border-radius: 22px;
      background: #fff;
      margin-top: 12px;
    }

    .money-list {
      display: grid;
      gap: 8px;
      margin: 12px 0 4px;
    }

    .money-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .money-row b { color: var(--text); }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(20px + var(--safe-bottom));
      transform: translateX(-50%) translateY(22px);
      opacity: 0;
      pointer-events: none;
      background: rgba(17, 24, 39, 0.95);
      color: #fff;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      z-index: 80;
      transition: 0.22s ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (min-width: 560px) {
      .app { padding-top: 28px; }
      .main-card, .result-area { padding: 28px 24px; }
      .modal-backdrop { align-items: center; }
      .sheet { border-radius: 30px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <button class="gear-btn" id="openSettings" aria-label="設定を開く">⚙</button>
    </header>

    <section class="main-card">
      <div class="time-grid">
        <div class="field">
          <label for="startTime">勤務開始時間</label>
          <input id="startTime" class="time-input" type="time" value="00:00" />
        </div>
        <div class="field">
          <label for="endTime">勤務終了時間</label>
          <input id="endTime" class="time-input" type="time" value="00:00" />
        </div>
      </div>

      <div class="break-section">
        <div class="break-head">
          <label>休憩時間</label>
          <button class="mini-btn" id="addBreakBtn" type="button">＋ 休憩を追加</button>
        </div>
        <div class="break-list" id="breakList"></div>
      </div>

      <button class="primary-btn" id="calculateBtn">計算開始</button>
    </section>

    <section class="result-area" id="resultArea">
      <div class="result-times">
        <span id="resultStart">--:--</span>
        <span>→</span>
        <span id="resultEnd">--:--</span>
      </div>

      <div class="result-line">
        <div class="result-label">合計金額</div>
        <div class="result-value total" id="totalAmount">0円</div>
      </div>
      <div class="result-line">
        <div class="result-label">うち、手当</div>
        <div class="result-value" id="allowanceAmount">0円</div>
      </div>

      <div class="breakdown" id="breakdown"></div>

      <div class="save-row">
        <button class="secondary-btn" id="openSave">保存</button>
      </div>
    </section>
  </main>

  <div class="modal-backdrop" id="saveModal" aria-hidden="true">
    <section class="sheet" role="dialog" aria-modal="true" aria-labelledby="saveTitle">
      <div class="sheet-header">
        <div class="sheet-title" id="saveTitle">計算結果を保存</div>
        <button class="close-btn" data-close="saveModal">×</button>
      </div>
      <div class="settings-grid">
        <div class="field">
          <label for="saveName">名前</label>
          <input id="saveName" class="text-input" type="text" placeholder="例：6/29 夜勤" />
        </div>
        <div class="save-preview" id="savePreview"></div>
        <button class="primary-btn" id="saveResultBtn">この内容で保存</button>
      </div>
    </section>
  </div>

  <div class="modal-backdrop" id="settingsModal" aria-hidden="true">
    <section class="sheet settings-sheet" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="sheet-header">
        <div class="sheet-title" id="settingsTitle">設定</div>
        <button class="close-btn" data-close="settingsModal">×</button>
      </div>

      <div class="settings-menu" id="settingsMenu">
        <button class="settings-menu-btn" data-open-panel="wagePanel" type="button">時給設定</button>
        <button class="settings-menu-btn" data-open-panel="allowancePanel" type="button">手当設定</button>
        <button class="settings-menu-btn" data-open-panel="savedPanel" type="button">保存一覧</button>
      </div>

      <div class="settings-detail" id="settingsDetail">
        <div class="detail-header">
          <button class="ghost-btn" id="backSettingsMenu" type="button">← 戻る</button>
          <div class="detail-title" id="settingsDetailTitle">時給設定</div>
        </div>
        <div class="settings-content">
          <section class="tab-panel" id="wagePanel">
            <div class="setting-card settings-grid">
              <div class="field">
                <label for="hourlyWage">時給</label>
                <input id="hourlyWage" class="number-input" type="number" inputmode="decimal" value="1200" step="1" />
              </div>
              <button class="primary-btn" id="saveSettingsBtn">設定を保存</button>
            </div>
          </section>

          <section class="tab-panel" id="allowancePanel">
            <div class="setting-card">
              <div class="allowance-top">
                <div>
                  <div class="allowance-name" id="allowanceFormTitle">手当を追加</div>
                </div>
              </div>
              <div class="settings-grid">
                <div class="field">
                  <label for="newAllowanceName">手当名</label>
                  <input id="newAllowanceName" class="text-input" type="text" placeholder="例：深夜手当" />
                </div>
                <div class="field">
                  <label for="newAllowanceType">種類</label>
                  <select id="newAllowanceType">
                    <option value="time">時間制</option>
                    <option value="fixed">固定額</option>
                  </select>
                </div>
                <div id="newFixedArea" style="display:none;">
                  <div class="field">
                    <label for="newFixedAmount">固定額</label>
                    <input id="newFixedAmount" class="number-input" type="number" inputmode="decimal" value="0" step="1" />
                  </div>
                </div>
                <div id="newTimeArea" class="settings-grid">
                  <div class="row-2">
                    <div class="field">
                      <label for="newStartWindow">開始</label>
                      <input id="newStartWindow" class="time-input" type="time" value="00:00" />
                    </div>
                    <div class="field">
                      <label for="newEndWindow">終了</label>
                      <input id="newEndWindow" class="time-input" type="time" value="00:00" />
                    </div>
                  </div>
                  <div class="field" id="newPercentArea">
                    <label for="newPercent">割合（%）</label>
                    <input id="newPercent" class="number-input" type="number" inputmode="decimal" value="0" step="0.1" />
                  </div>
                </div>
                <button class="primary-btn" id="addAllowanceBtn">追加する</button>
                <button class="secondary-btn" id="cancelEditAllowanceBtn" type="button" style="display:none; margin:0 auto;">キャンセル</button>
              </div>
            </div>
            <div id="allowanceList"></div>
          </section>

          <section class="tab-panel" id="savedPanel">
            <div id="savedList"></div>
          </section>
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast">保存しました</div>

  <script>
    const OLD_LS_SETTINGS = "baito_calc_settings_v2";
    const OLD_LS_SAVED = "baito_calc_saved_v2";
    const DEVICE_ID_KEY = "baito_calc_device_id_v1";

    function getOrCreateDeviceId() {
      try {
        let id = localStorage.getItem(DEVICE_ID_KEY);
        if (!id) {
          id = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}_${Math.random().toString(36).slice(2)}`;
          localStorage.setItem(DEVICE_ID_KEY, id);
        }
        return id;
      } catch {
        return `fallback_${Date.now()}_${Math.random().toString(36).slice(2)}`;
      }
    }

    // 保存内容はクラウドへ送らず、この端末・このブラウザ内だけで使う。
    // 端末ごとに別IDを作り、保存キーも分ける。
    const DEVICE_ID = getOrCreateDeviceId();
    const LS_SETTINGS = `baito_calc_settings_v3_${DEVICE_ID}`;
    const LS_SAVED = `baito_calc_saved_v3_${DEVICE_ID}`;

    function migrateOldLocalData() {
      try {
        if (!localStorage.getItem(LS_SETTINGS)) {
          const oldSettings = localStorage.getItem(OLD_LS_SETTINGS);
          if (oldSettings) localStorage.setItem(LS_SETTINGS, oldSettings);
        }
        if (!localStorage.getItem(LS_SAVED)) {
          const oldSaved = localStorage.getItem(OLD_LS_SAVED);
          if (oldSaved) localStorage.setItem(LS_SAVED, oldSaved);
        }
      } catch {
        // localStorageが使えない環境では何もしない
      }
    }

    migrateOldLocalData();

    const yen = new Intl.NumberFormat("ja-JP", {
      style: "currency",
      currency: "JPY",
      maximumFractionDigits: 0,
    });

    const $ = (id) => document.getElementById(id);

    let currentResult = null;
    let editingAllowanceId = null;
    let settings = loadSettings();
    let savedItems = loadSavedItems();
    let breakRows = [];

    function defaultSettings() {
      return {
        hourlyWage: 1200,
        allowances: [],
      };
    }

    function isOldDefaultNightAllowance(a) {
      return a
        && a.name === "深夜手当"
        && a.type === "time"
        && a.start === "22:00"
        && a.end === "05:00"
        && Number(a.percent) === 25
        && Number(a.fixedAmount || 0) === 0;
    }

    function normalizeSettings(parsed) {
      const base = {
        ...defaultSettings(),
        ...parsed,
        allowances: Array.isArray(parsed.allowances) ? parsed.allowances : [],
      };

      if (base.allowances.length === 1 && isOldDefaultNightAllowance(base.allowances[0])) {
        base.allowances = [];
      }

      return base;
    }

    function loadSettings() {
      try {
        const raw = localStorage.getItem(LS_SETTINGS);
        if (!raw) return defaultSettings();
        const parsed = JSON.parse(raw);
        const normalized = normalizeSettings(parsed);
        localStorage.setItem(LS_SETTINGS, JSON.stringify(normalized));
        return normalized;
      } catch {
        return defaultSettings();
      }
    }

    function saveSettings() {
      localStorage.setItem(LS_SETTINGS, JSON.stringify(settings));
    }

    function loadSavedItems() {
      try {
        const raw = localStorage.getItem(LS_SAVED);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveSavedItems() {
      localStorage.setItem(LS_SAVED, JSON.stringify(savedItems));
    }

    function parseTimeToMinutes(t) {
      if (!t || !/^\d{2}:\d{2}$/.test(t)) return null;
      const [h, m] = t.split(":").map(Number);
      return h * 60 + m;
    }

    function formatMinutesAsTime(minutes) {
      const normalized = ((minutes % 1440) + 1440) % 1440;
      const h = Math.floor(normalized / 60);
      const m = normalized % 60;
      return String(h).padStart(2, "0") + ":" + String(m).padStart(2, "0");
    }

    function hoursText(minutes) {
      const sign = minutes < 0 ? "-" : "";
      const abs = Math.abs(minutes);
      const h = Math.floor(abs / 60);
      const m = Math.round(abs % 60);
      if (h === 0) return `${sign}${m}分`;
      if (m === 0) return `${sign}${h}時間`;
      return `${sign}${h}時間${m}分`;
    }

    function clampNumber(value, fallback = 0) {
      const num = Number(value);
      return Number.isFinite(num) ? num : fallback;
    }

    function getShiftRange(startStr, endStr) {
      const start = parseTimeToMinutes(startStr);
      let end = parseTimeToMinutes(endStr);
      if (start === null || end === null) return null;
      if (end <= start) end += 1440;
      return { start, end, rawMinutes: end - start };
    }

    function overlapMinutes(aStart, aEnd, bStart, bEnd) {
      return Math.max(0, Math.min(aEnd, bEnd) - Math.max(aStart, bStart));
    }

    function makeId() {
      return crypto.randomUUID ? crypto.randomUUID() : String(Date.now() + Math.random());
    }

    function allowanceWindowSegments(shiftStart, shiftEnd, windowStartStr, windowEndStr) {
      const wStartBase = parseTimeToMinutes(windowStartStr);
      let wEndBase = parseTimeToMinutes(windowEndStr);
      if (wStartBase === null || wEndBase === null) return [];
      if (wEndBase <= wStartBase) wEndBase += 1440;
      const windowLength = wEndBase - wStartBase;
      const segments = [];

      const firstDay = Math.floor((shiftStart - 1440) / 1440);
      const lastDay = Math.floor((shiftEnd + 1440) / 1440);
      for (let day = firstDay; day <= lastDay; day++) {
        const wStart = wStartBase + day * 1440;
        const wEnd = wStart + windowLength;
        const start = Math.max(shiftStart, wStart);
        const end = Math.min(shiftEnd, wEnd);
        if (end > start) segments.push({ start, end });
      }
      return segments;
    }

    function minutesInSegments(segments) {
      return segments.reduce((sum, seg) => sum + Math.max(0, seg.end - seg.start), 0);
    }

    function subtractBreaksFromSegments(segments, breaks) {
      let total = minutesInSegments(segments);
      segments.forEach((seg) => {
        breaks.forEach((br) => {
          total -= overlapMinutes(seg.start, seg.end, br.start, br.end);
        });
      });
      return Math.max(0, total);
    }

    function resolveBreakRange(shiftStart, shiftEnd, startStr, endStr, index) {
      const label = `休憩${index + 1}`;
      if (!startStr && !endStr) return null;
      if (!startStr || !endStr) throw new Error(`${label}の開始・終了を両方入力してください`);

      const baseStart = parseTimeToMinutes(startStr);
      let baseEnd = parseTimeToMinutes(endStr);
      if (baseStart === null || baseEnd === null) throw new Error(`${label}の時間が正しくないよ`);
      if (baseEnd <= baseStart) baseEnd += 1440;
      const duration = baseEnd - baseStart;
      if (duration <= 0) throw new Error(`${label}の時間が0分になってる`);
      if (duration >= shiftEnd - shiftStart) throw new Error(`${label}が勤務時間以上になってる`);

      let best = null;
      for (let day = -1; day <= 2; day++) {
        const start = baseStart + day * 1440;
        const end = baseEnd + day * 1440;
        const overlap = overlapMinutes(shiftStart, shiftEnd, start, end);
        if (!best || overlap > best.overlap) best = { start, end, overlap };
      }

      if (!best || best.overlap <= 0) throw new Error(`${label}が勤務時間と重なってないよ`);
      if (best.overlap < duration) throw new Error(`${label}が勤務時間外にかかってるよ`);
      return {
        start: best.start,
        end: best.end,
        minutes: duration,
        displayStart: startStr,
        displayEnd: endStr,
      };
    }

    function readBreakRanges(range) {
      const ranges = [];
      document.querySelectorAll(".break-card").forEach((card, index) => {
        const startStr = card.querySelector(".break-start").value;
        const endStr = card.querySelector(".break-end").value;
        const resolved = resolveBreakRange(range.start, range.end, startStr, endStr, index);
        if (resolved) ranges.push(resolved);
      });

      ranges.sort((a, b) => a.start - b.start);
      for (let i = 1; i < ranges.length; i++) {
        if (ranges[i].start < ranges[i - 1].end) throw new Error("休憩時間が重なってるよ");
      }
      return ranges;
    }

    function totalBreakMinutes(breaks) {
      return breaks.reduce((sum, br) => sum + br.minutes, 0);
    }

    function breaksText(breaks) {
      if (!breaks.length) return "なし";
      return breaks.map((br) => `${br.displayStart}〜${br.displayEnd}`).join("、");
    }

    function calculate() {
      const startStr = $("startTime").value;
      const endStr = $("endTime").value;
      const range = getShiftRange(startStr, endStr);
      if (!range) {
        toast("開始・終了時間を入力してください");
        return;
      }

      let breakRanges = [];
      try {
        breakRanges = readBreakRanges(range);
      } catch (error) {
        toast(error.message || "休憩時間を確認してください");
        return;
      }

      const breakMinutes = totalBreakMinutes(breakRanges);
      if (breakMinutes >= range.rawMinutes) {
        toast("休憩が勤務時間以上になってる");
        return;
      }

      const hourlyWage = clampNumber(settings.hourlyWage, 0);
      const workMinutes = range.rawMinutes - breakMinutes;
      const basePay = workMinutes * hourlyWage / 60;
      const breakdown = [];
      let allowanceTotal = 0;

      settings.allowances.filter(a => a.enabled).forEach((a) => {
        let amount = 0;
        let minutes = null;
        let detail = "";

        if (a.type === "fixed") {
          amount = clampNumber(a.fixedAmount, 0);
          detail = "固定額";
        } else {
          const targetSegments = allowanceWindowSegments(range.start, range.end, a.start, a.end);
          const targetMinutes = subtractBreaksFromSegments(targetSegments, breakRanges);
          minutes = targetMinutes;

          if (a.timeCalcMode === "perHour") {
            const perHour = clampNumber(a.perHour, 0);
            amount = targetMinutes * perHour / 60;
            detail = `${formatMinutesAsTime(parseTimeToMinutes(a.start))}〜${formatMinutesAsTime(parseTimeToMinutes(a.end))} / ${yen.format(perHour)}毎時`;
          } else {
            const percent = clampNumber(a.percent, 0);
            amount = targetMinutes * hourlyWage * percent / 100 / 60;
            detail = `${formatMinutesAsTime(parseTimeToMinutes(a.start))}〜${formatMinutesAsTime(parseTimeToMinutes(a.end))} / 時給×${percent}%`;
          }
        }

        allowanceTotal += amount;
        breakdown.push({
          name: a.name || "手当",
          amount,
          minutes,
          detail,
        });
      });

      const total = basePay + allowanceTotal;
      currentResult = {
        id: makeId(),
        createdAt: new Date().toISOString(),
        start: startStr,
        end: endStr,
        breaks: breakRanges.map((br) => ({
          start: br.displayStart,
          end: br.displayEnd,
          minutes: br.minutes,
        })),
        breakMinutes,
        rawMinutes: range.rawMinutes,
        workMinutes,
        hourlyWage,
        basePay,
        allowanceTotal,
        total,
        breakdown,
      };
      renderResult();
    }

    function renderResult() {
      if (!currentResult) return;
      $("resultStart").textContent = currentResult.start;
      $("resultEnd").textContent = currentResult.end;
      $("totalAmount").textContent = yen.format(Math.round(currentResult.total));
      $("allowanceAmount").textContent = yen.format(Math.round(currentResult.allowanceTotal));

      const lines = [
        `<div><strong>実働：</strong>${hoursText(currentResult.workMinutes)}（休憩 ${hoursText(currentResult.breakMinutes)}）</div>`,
        `<div><strong>休憩：</strong>${escapeHtml(breaksText((currentResult.breaks || []).map(br => ({ displayStart: br.start, displayEnd: br.end }))))}</div>`,
        `<div><strong>基本給：</strong>${yen.format(Math.round(currentResult.basePay))}</div>`,
      ];

      const visibleBreakdown = currentResult.breakdown.filter((b) => b.minutes === null || b.minutes > 0);
      if (visibleBreakdown.length) {
        lines.push(`<div style="margin-top:8px;"><strong>手当内訳</strong></div>`);
        visibleBreakdown.forEach((b) => {
          const time = b.minutes === null ? "" : ` / 対象 ${hoursText(b.minutes)}`;
          lines.push(`<div>${escapeHtml(b.name)}：${yen.format(Math.round(b.amount))}${time}<br>${escapeHtml(b.detail)}</div>`);
        });
      } else {
        lines.push(`<div>手当なし</div>`);
      }

      $("breakdown").innerHTML = lines.join("");
      $("resultArea").style.display = "block";
      $("resultArea").scrollIntoView({ behavior: "smooth", block: "nearest" });
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function openModal(id) {
      $(id).classList.add("show");
      $(id).setAttribute("aria-hidden", "false");
    }

    function closeModal(id) {
      $(id).classList.remove("show");
      $(id).setAttribute("aria-hidden", "true");
    }

    function toast(message) {
      const el = $("toast");
      el.textContent = message;
      el.classList.add("show");
      clearTimeout(toast._timer);
      toast._timer = setTimeout(() => el.classList.remove("show"), 1700);
    }

    function applySettingsToForm() {
      $("hourlyWage").value = settings.hourlyWage;
    }

    function syncSettingsFromForm() {
      settings.hourlyWage = clampNumber($("hourlyWage").value, 0);
      saveSettings();
      if (currentResult) calculate();
    }

    function renderBreakInputs() {
      const list = $("breakList");
      if (!breakRows.length) {
        list.innerHTML = `<div class="break-empty">休憩なし</div>`;
        return;
      }

      list.innerHTML = breakRows.map((row, index) => `
        <article class="break-card" data-id="${escapeHtml(row.id)}">
          <div class="break-card-top">
            <div class="break-title">休憩${index + 1}</div>
            <button class="ghost-btn" data-action="deleteBreak" type="button">削除</button>
          </div>
          <div class="row-2" style="margin-top:10px;">
            <div class="field">
              <label>開始</label>
              <input class="time-input break-start" type="time" value="${escapeHtml(row.start || "00:00")}" />
            </div>
            <div class="field">
              <label>終了</label>
              <input class="time-input break-end" type="time" value="${escapeHtml(row.end || "00:00")}" />
            </div>
          </div>
        </article>
      `).join("");
    }

    function addBreakRow() {
      breakRows.push({ id: makeId(), start: "00:00", end: "00:00" });
      renderBreakInputs();
    }

    function syncBreakRowsFromDom() {
      document.querySelectorAll(".break-card").forEach((card) => {
        const row = breakRows.find(item => item.id === card.dataset.id);
        if (!row) return;
        row.start = card.querySelector(".break-start").value;
        row.end = card.querySelector(".break-end").value;
      });
    }

    function renderAllowanceList() {
      const list = $("allowanceList");
      if (!settings.allowances.length) {
        list.innerHTML = `<div class="empty empty-card">手当なし</div>`;
        return;
      }

      list.innerHTML = settings.allowances.map((a) => {
        const detail = a.type === "fixed"
          ? `固定額：${yen.format(clampNumber(a.fixedAmount, 0))}`
          : a.timeCalcMode === "perHour"
            ? `時間制：${a.start}〜${a.end} / ${yen.format(clampNumber(a.perHour, 0))}毎時`
            : `時間制：${a.start}〜${a.end} / 時給×${clampNumber(a.percent, 0)}%`;

        return `
          <article class="allowance-card" data-id="${escapeHtml(a.id)}">
            <div class="allowance-top">
              <div>
                <div class="allowance-name">${escapeHtml(a.name || "手当")}</div>
                <div class="allowance-details">${escapeHtml(detail)}</div>
              </div>
              <div class="switch-row">
                <label class="check"><input type="checkbox" data-action="toggle" ${a.enabled ? "checked" : ""}>有効</label>
              </div>
            </div>
            <div class="row-2">
              <button class="secondary-btn" data-action="edit">編集</button>
              <button class="danger-btn" data-action="delete">削除</button>
            </div>
          </article>
        `;
      }).join("");
    }

    function resetAllowanceForm() {
      editingAllowanceId = null;
      $("allowanceFormTitle").textContent = "手当を追加";
      $("addAllowanceBtn").textContent = "追加する";
      $("cancelEditAllowanceBtn").style.display = "none";
      $("newAllowanceName").value = "";
      $("newAllowanceType").value = "time";
      $("newFixedAmount").value = "0";
      $("newStartWindow").value = "00:00";
      $("newEndWindow").value = "00:00";
      $("newPercent").value = "0";
      updateNewAllowanceVisibility();
    }

    function fillAllowanceFormForEdit(allowance) {
      editingAllowanceId = allowance.id;
      $("allowanceFormTitle").textContent = "手当を編集";
      $("addAllowanceBtn").textContent = "変更を保存";
      $("cancelEditAllowanceBtn").style.display = "block";
      $("newAllowanceName").value = allowance.name || "";
      $("newAllowanceType").value = allowance.type === "fixed" ? "fixed" : "time";
      $("newFixedAmount").value = String(clampNumber(allowance.fixedAmount, 0));
      $("newStartWindow").value = allowance.start || "00:00";
      $("newEndWindow").value = allowance.end || "00:00";

      let percent = clampNumber(allowance.percent, 0);
      if (allowance.timeCalcMode === "perHour") {
        const hourlyWage = clampNumber(settings.hourlyWage, 0);
        percent = hourlyWage ? clampNumber(allowance.perHour, 0) / hourlyWage * 100 : 0;
      }
      $("newPercent").value = String(Math.round(percent * 10) / 10);
      updateNewAllowanceVisibility();
      $("allowanceFormTitle").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function addAllowance() {
      const type = $("newAllowanceType").value;
      const name = $("newAllowanceName").value.trim() || (type === "time" ? "時間制手当" : "固定手当");
      const editIndex = settings.allowances.findIndex(a => a.id === editingAllowanceId);
      const previous = editIndex >= 0 ? settings.allowances[editIndex] : null;
      const allowance = {
        id: previous ? previous.id : makeId(),
        name,
        enabled: previous ? !!previous.enabled : true,
        type,
        fixedAmount: clampNumber($("newFixedAmount").value, 0),
        start: $("newStartWindow").value || "00:00",
        end: $("newEndWindow").value || "00:00",
        timeCalcMode: "percent",
        percent: clampNumber($("newPercent").value, 0),
        perHour: 0,
      };

      if (previous) {
        settings.allowances[editIndex] = allowance;
      } else {
        settings.allowances.push(allowance);
      }

      saveSettings();
      renderAllowanceList();
      resetAllowanceForm();
      if (currentResult) calculate();
    }

    function updateNewAllowanceVisibility() {
      const type = $("newAllowanceType").value;
      $("newFixedArea").style.display = type === "fixed" ? "block" : "none";
      $("newTimeArea").style.display = type === "time" ? "grid" : "none";
    }


    function renderSavePreview() {
      if (!currentResult) return;
      $("savePreview").innerHTML = `
        <div class="money-list">
          <div class="money-row"><span>合計金額</span><b>${yen.format(Math.round(currentResult.total))}</b></div>
          <div class="money-row"><span>うち、手当</span><b>${yen.format(Math.round(currentResult.allowanceTotal))}</b></div>
          <div class="money-row"><span>基本給</span><b>${yen.format(Math.round(currentResult.basePay))}</b></div>
          <div class="money-row"><span>勤務</span><b>${currentResult.start} → ${currentResult.end}</b></div>
          <div class="money-row"><span>休憩</span><b>${escapeHtml(breaksText((currentResult.breaks || []).map(br => ({ displayStart: br.start, displayEnd: br.end }))))}</b></div>
        </div>
      `;
    }

    function saveCurrentResult() {
      if (!currentResult) {
        toast("先に計算してください");
        return;
      }
      const name = $("saveName").value.trim() || `${new Date().toLocaleDateString("ja-JP")}の勤務`;
      savedItems.unshift({ ...currentResult, name });
      saveSavedItems();
      renderSavedList();
      closeModal("saveModal");
    }

    function renderSavedList() {
      const list = $("savedList");
      if (!savedItems.length) {
        list.innerHTML = `<div class="empty">保存結果はありません</div>`;
        return;
      }

      list.innerHTML = savedItems.map((item) => {
        const created = item.createdAt ? new Date(item.createdAt).toLocaleString("ja-JP", { dateStyle: "short", timeStyle: "short" }) : "";
        return `
          <article class="saved-card" data-id="${escapeHtml(item.id)}">
            <div class="saved-top">
              <div>
                <div class="saved-name">${escapeHtml(item.name || "保存データ")}</div>
                <div class="saved-details">${escapeHtml(created)} / ${escapeHtml(item.start)} → ${escapeHtml(item.end)} / 休憩 ${hoursText(item.breakMinutes || 0)}</div>
              </div>
              <button class="danger-btn" data-action="deleteSaved">削除</button>
            </div>
            <div class="money-list">
              <div class="money-row"><span>合計金額</span><b>${yen.format(Math.round(item.total || 0))}</b></div>
              <div class="money-row"><span>うち、手当</span><b>${yen.format(Math.round(item.allowanceTotal || 0))}</b></div>
            </div>
          </article>
        `;
      }).join("");
    }

    function resetSettingsMenu() {
      $("settingsMenu").classList.remove("hidden");
      $("settingsDetail").classList.remove("active");
      document.querySelectorAll(".tab-panel").forEach(panel => panel.classList.remove("active"));
    }

    function openSettingsPanel(panelId) {
      const titles = {
        wagePanel: "時給設定",
        allowancePanel: "手当設定",
        savedPanel: "保存一覧",
      };
      $("settingsDetailTitle").textContent = titles[panelId] || "設定";
      $("settingsMenu").classList.add("hidden");
      $("settingsDetail").classList.add("active");
      document.querySelectorAll(".tab-panel").forEach(panel => {
        panel.classList.toggle("active", panel.id === panelId);
      });
      const content = document.querySelector("#settingsModal .settings-content");
      if (content) content.scrollTop = 0;
    }

    $("calculateBtn").addEventListener("click", calculate);
    $("addBreakBtn").addEventListener("click", addBreakRow);
    $("breakList").addEventListener("input", syncBreakRowsFromDom);
    $("breakList").addEventListener("change", syncBreakRowsFromDom);
    $("breakList").addEventListener("click", (e) => {
      if (e.target.dataset.action !== "deleteBreak") return;
      const card = e.target.closest(".break-card");
      if (!card) return;
      breakRows = breakRows.filter(row => row.id !== card.dataset.id);
      renderBreakInputs();
      if (currentResult) calculate();
    });
    $("openSettings").addEventListener("click", () => {
      applySettingsToForm();
      renderAllowanceList();
      renderSavedList();
      resetSettingsMenu();
      openModal("settingsModal");
    });
    $("openSave").addEventListener("click", () => {
      if (!currentResult) {
        toast("先に計算してください");
        return;
      }
      $("saveName").value = "";
      renderSavePreview();
      openModal("saveModal");
      setTimeout(() => $("saveName").focus(), 80);
    });

    document.querySelectorAll("[data-close]").forEach((btn) => {
      btn.addEventListener("click", () => closeModal(btn.dataset.close));
    });

    [$("settingsModal"), $("saveModal")].forEach((modal) => {
      modal.addEventListener("click", (e) => {
        if (e.target === modal) closeModal(modal.id);
      });
    });

    document.querySelectorAll("[data-open-panel]").forEach(btn => {
      btn.addEventListener("click", () => openSettingsPanel(btn.dataset.openPanel));
    });

    $("backSettingsMenu").addEventListener("click", resetSettingsMenu);

    $("saveSettingsBtn").addEventListener("click", syncSettingsFromForm);
    $("addAllowanceBtn").addEventListener("click", addAllowance);
    $("cancelEditAllowanceBtn").addEventListener("click", resetAllowanceForm);
    $("saveResultBtn").addEventListener("click", saveCurrentResult);
    $("newAllowanceType").addEventListener("change", updateNewAllowanceVisibility);

    $("allowanceList").addEventListener("click", (e) => {
      const card = e.target.closest(".allowance-card");
      if (!card) return;
      const id = card.dataset.id;
      const index = settings.allowances.findIndex(a => a.id === id);
      if (index < 0) return;
      const action = e.target.dataset.action;

      if (action === "edit") {
        fillAllowanceFormForEdit(settings.allowances[index]);
        return;
      }

      if (action === "delete") {
        const deletedId = settings.allowances[index].id;
        settings.allowances.splice(index, 1);
        if (editingAllowanceId === deletedId) resetAllowanceForm();
        saveSettings();
        renderAllowanceList();
  
        if (currentResult) calculate();
      }
    });

    $("allowanceList").addEventListener("change", (e) => {
      const card = e.target.closest(".allowance-card");
      if (!card) return;
      const id = card.dataset.id;
      const allowance = settings.allowances.find(a => a.id === id);
      if (!allowance) return;
      if (e.target.dataset.action === "toggle") {
        allowance.enabled = e.target.checked;
        saveSettings();
        renderAllowanceList();
        if (currentResult) calculate();
      }
    });

    $("savedList").addEventListener("click", (e) => {
      const action = e.target.dataset.action;
      if (action !== "deleteSaved") return;
      const card = e.target.closest(".saved-card");
      if (!card) return;
      savedItems = savedItems.filter(item => item.id !== card.dataset.id);
      saveSavedItems();
      renderSavedList();

    });

    applySettingsToForm();
    renderBreakInputs();
    updateNewAllowanceVisibility();
    renderAllowanceList();
    renderSavedList();
  </script>
</body>
</html>
